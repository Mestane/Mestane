  <!-- text -->
  <text x="340" y="92" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="34" font-weight="700" fill="#e6edf3" letter-spacing="-1">Mestane</text>
  <text x="340" y="120" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#8b949e" letter-spacing="2">BACKEND DEV &amp; Arch Linux Enjoyer (BTW)</text>
  <text x="340" y="145" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#58a6ff" opacity="0.7">istanbul, turkey</text>
